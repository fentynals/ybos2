<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUNGSBRUH.OS — DISPATCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#0B0E13; --steel:#131822; --steel2:#1A2130; --line:#232C3E;
  --amber:#FFAA3C; --amber-dim:#8a5a1e; --red:#E23B3B; --tracer:#9FD1FF;
  --concrete:#C9CDD6; --dust:#6B7385; --ok:#7BD88A;
  --hazard:repeating-linear-gradient(-45deg,var(--amber) 0 10px,#151a24 10px 20px);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--asphalt); color:var(--concrete);
  font-family:'Chakra Petch',sans-serif; user-select:none;
}
canvas#bg{position:fixed;inset:0;z-index:0}
/* ===== scanline + vignette atmosphere ===== */
body::after{
  content:"";position:fixed;inset:0;z-index:99;pointer-events:none;
  background:
    radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);
}
/* ===== boot ===== */
#boot{
  position:fixed;inset:0;z-index:1000;background:#05070B;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  transition:opacity .6s;cursor:pointer;
}
#boot.gone{opacity:0;pointer-events:none}
#bootlogo{font-family:'Archivo Black';font-size:clamp(34px,6vw,72px);letter-spacing:.04em;color:var(--red);
  text-shadow:0 0 34px rgba(226,59,59,.55);}
#bootlogo span{color:var(--amber)}
#bootlog{font-family:'IBM Plex Mono';font-size:12px;color:var(--dust);margin-top:26px;width:min(560px,86vw);height:180px;overflow:hidden;line-height:1.7}
#bootlog .ok{color:var(--ok)} #bootlog .warn{color:var(--amber)}
#boothint{font-family:'IBM Plex Mono';font-size:10px;color:#3a4254;margin-top:18px;letter-spacing:.3em}
/* ===== top bar ===== */
#topbar{
  position:fixed;top:0;left:0;right:0;height:38px;z-index:500;
  display:flex;align-items:center;gap:18px;padding:0 14px;
  background:linear-gradient(180deg,rgba(19,24,34,.94),rgba(19,24,34,.78));
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px);
  font-family:'IBM Plex Mono';font-size:11px;
}
#topbar .brand{font-family:'Archivo Black';font-size:13px;color:var(--red);letter-spacing:.06em}
#topbar .brand em{font-style:normal;color:var(--amber)}
#topbar .stat{color:var(--dust)} #topbar .stat b{color:var(--concrete);font-weight:500}
#topbar .grow{flex:1}
#clock{color:var(--amber);letter-spacing:.08em}
#usage{display:flex;align-items:center;gap:6px;color:var(--dust)}
#usage .bar{width:80px;height:5px;background:var(--steel2);border:1px solid var(--line)}
#usage .bar i{display:block;height:100%;background:var(--amber);width:0%;transition:width .8s ease}
.kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:3px;padding:1px 5px;color:var(--dust);font-size:10px}
/* ===== desktop + windows ===== */
#desk{position:fixed;inset:38px 0 54px 0;z-index:10}
.win{
  position:absolute;min-width:240px;background:rgba(17,22,32,.93);
  border:1px solid var(--line);box-shadow:0 18px 60px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4);
  display:flex;flex-direction:column;backdrop-filter:blur(4px);
}
.win.focus{border-color:var(--amber-dim);box-shadow:0 24px 70px rgba(0,0,0,.75),0 0 24px rgba(255,170,60,.07)}
.win.min{display:none}
/* resize handles */
.rz{position:absolute;z-index:7}
.rz-r{top:8px;bottom:10px;right:-3px;width:7px;cursor:ew-resize}
.rz-b{left:8px;right:10px;bottom:-3px;height:7px;cursor:ns-resize}
.rz-br{right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize}
.rz-br::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;
  border-right:2px solid var(--dust);border-bottom:2px solid var(--dust);opacity:.55}
.win.focus .rz-br::after{border-color:var(--amber);opacity:.7}
.winhead{
  height:30px;display:flex;align-items:center;gap:10px;padding:0 10px;cursor:grab;
  background:linear-gradient(180deg,#1B2231,#161C29);border-bottom:1px solid var(--line);
  font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.18em;color:var(--dust);
}
.winhead:active{cursor:grabbing}
.winhead .tape{width:26px;height:8px;background:var(--hazard);opacity:.8}
.winhead .t{color:var(--concrete)}
.winhead .grow{flex:1}
.winbtn{width:16px;height:16px;border:1px solid var(--line);background:transparent;color:var(--dust);
  font-family:'IBM Plex Mono';font-size:9px;line-height:1;cursor:pointer;display:grid;place-items:center}
.winbtn:hover{border-color:var(--amber);color:var(--amber)}
.winbody{flex:1;overflow:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.winbody::-webkit-scrollbar{width:6px}.winbody::-webkit-scrollbar-thumb{background:var(--line)}
/* ===== dock ===== */
#dock{
  position:fixed;bottom:0;left:0;right:0;height:54px;z-index:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(0deg,rgba(11,14,19,.96),rgba(11,14,19,.7));
  border-top:1px solid var(--line);
}
.dockbtn{
  height:38px;padding:0 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  border:1px solid var(--line);background:var(--steel);color:var(--dust);
  font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;position:relative;
  transition:transform .12s,border-color .12s,color .12s;
}
.dockbtn:hover{transform:translateY(-4px);border-color:var(--amber);color:var(--concrete)}
.dockbtn.open{color:var(--amber);border-color:var(--amber-dim)}
.dockbtn.open::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;background:var(--amber);border-radius:50%}
.dockbtn .ic{font-size:14px}
/* ===== shared bits ===== */
.eyebrow{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.3em;color:var(--amber);margin-bottom:6px}
.h1{font-family:'Archivo Black';font-size:22px;letter-spacing:.02em;color:#EDEFF4;line-height:1.1}
.dim{color:var(--dust)} .mono{font-family:'IBM Plex Mono'}
.chip{display:inline-block;font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.12em;
  border:1px solid var(--line);padding:2px 7px;color:var(--dust);margin:2px 3px 2px 0}
.chip.amber{color:var(--amber);border-color:var(--amber-dim)}
.chip.red{color:var(--red);border-color:#5c2424}
.chip.blue{color:var(--tracer);border-color:#2c4358}
.chip.ok{color:var(--ok);border-color:#2c5136}
.rule{height:1px;background:var(--line);margin:12px 0}
/* mission control */
.gamecard{border:1px solid var(--line);background:linear-gradient(160deg,#181f2e, #10141d);padding:16px;position:relative;overflow:hidden}
.gamecard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--hazard)}
.gamecard .gtitle{font-family:'Archivo Black';font-size:30px;color:var(--red);text-shadow:0 0 22px rgba(226,59,59,.35)}
.gamecard .gsub{font-family:'IBM Plex Mono';font-size:10px;color:var(--dust);letter-spacing:.2em;margin-top:2px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-top:14px}
.stat-cell{border:1px solid var(--line);padding:8px;background:rgba(11,14,19,.5)}
.stat-cell .n{font-family:'Chakra Petch';font-weight:700;font-size:20px;color:var(--amber)}
.stat-cell .l{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.18em;color:var(--dust);margin-top:2px}
/* goals */
.goal{margin-bottom:14px}
.goal .gl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;margin-bottom:5px}
.goal .gl b{color:var(--concrete);font-weight:500}.goal .gl span{color:var(--amber)}
.goal .track{height:8px;background:var(--steel2);border:1px solid var(--line);position:relative}
.goal .track i{position:absolute;inset:0;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transform-origin:left;transform:scaleX(var(--p));transition:transform 1.2s cubic-bezier(.2,.8,.2,1)}
.goal .why{font-size:11px;color:var(--dust);margin-top:5px;line-height:1.5}
/* kanban */
#kb,#ctkb{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:10px;min-width:720px}
.kcol{background:rgba(11,14,19,.4);border:1px solid var(--line);padding:8px;min-height:200px}
.kcol h4{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.26em;color:var(--dust);padding:2px 2px 8px;display:flex;justify-content:space-between}
.kcol h4 .cnt{color:var(--amber)}
.kcol.dragover{border-color:var(--amber);background:rgba(255,170,60,.04)}
.card{border:1px solid var(--line);background:var(--steel);padding:9px;margin-bottom:8px;cursor:grab;position:relative}
.card:active{cursor:grabbing}
.card .ct{font-size:12px;line-height:1.4;color:var(--concrete)}
.card .cm{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.1em;color:var(--dust);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.card.p-high{border-left:3px solid var(--red)}
.card.p-med{border-left:3px solid var(--amber)}
.card.p-low{border-left:3px solid var(--tracer)}
/* agents */
.agent{border:1px solid var(--line);border-left:3px solid var(--dust);background:var(--steel);padding:11px 12px;margin-bottom:10px;transition:border-color .3s}
.agent.busy{border-left-color:var(--amber)}
.agent .ah{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.12em}
.agent .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite;flex:none}
.agent .dot.idle{background:var(--dust);animation:none}
.agent .dot.busy{background:var(--amber)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,170,60,.5)}50%{box-shadow:0 0 0 6px rgba(255,170,60,0)}}
.agent .an{color:#EDEFF4;font-weight:600} .agent .ar{color:var(--dust);margin-left:auto;font-size:9px;letter-spacing:.14em}
.agent .atask{font-size:11.5px;color:var(--concrete);margin-top:8px;line-height:1.5}
.agent.idle .atask{color:var(--dust)}
.agent .state{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.2em;color:var(--dust);margin-top:7px;display:flex;gap:8px;align-items:center}
.agent.busy .state .lbl{color:var(--amber)}
.agtag{display:inline-block;font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.12em;padding:1px 6px;border:1px solid var(--line);margin-right:6px}
.agtag.okx{color:var(--ok);border-color:#2c5136} .agtag.fx{color:var(--red);border-color:#5c2424}
.agtag.shipx{color:var(--tracer);border-color:#2c4358} .agtag.out{color:var(--dust)}
/* game health */
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px}
.kpi .cell{border:1px solid var(--line);background:linear-gradient(160deg,#181f2e,#10141d);padding:12px 12px 10px;position:relative;overflow:hidden}
.kpi .cell::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);opacity:.5}
.kpi .cell.live::before{background:var(--ok)}
.kpi .n{font-family:'Chakra Petch';font-weight:700;font-size:26px;color:var(--concrete);line-height:1}
.kpi .n.hot{color:var(--ok)}
.kpi .l{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.18em;color:var(--dust);margin-top:6px}
.kpi .s{font-family:'IBM Plex Mono';font-size:9px;color:var(--amber);margin-top:3px}
.ghwait{border:1px dashed var(--amber-dim);background:rgba(255,170,60,.05);padding:12px;font-size:11.5px;line-height:1.6;color:var(--concrete)}
/* bugs */
.bug{border:1px solid var(--line);border-left-width:3px;background:var(--steel);padding:9px 11px;margin-bottom:8px}
.bug.open{border-left-color:var(--red)} .bug.watch{border-left-color:var(--amber)} .bug.killed{border-left-color:var(--ok);opacity:.62}
.bug .bh{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.12em}
.bug .st{padding:1px 6px;border:1px solid var(--line)}
.bug.open .st{color:var(--red)} .bug.watch .st{color:var(--amber)} .bug.killed .st{color:var(--ok)}
.bug .sv{color:var(--dust)} .bug .bt{color:var(--concrete);margin-left:auto;font-size:11px;letter-spacing:0}
.bug .bn{font-size:11px;color:var(--dust);margin-top:6px;line-height:1.5}
/* task board (persistent) */
.tbctl{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.tbctl input{flex:1;min-width:120px;background:#0A0D13;border:1px solid var(--line);color:var(--concrete);font-family:'IBM Plex Mono';font-size:11px;padding:5px 7px}
.tbbtn{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.12em;border:1px solid var(--line);color:var(--dust);background:transparent;padding:5px 9px;cursor:pointer}
.tbbtn:hover{border-color:var(--amber);color:var(--amber)}
.card .del{position:absolute;top:5px;right:6px;color:var(--dust);cursor:pointer;font-size:12px;line-height:1;opacity:0}
.card:hover .del{opacity:1} .card .del:hover{color:var(--red)}
.card .pr-cyc{cursor:pointer}
/* content studio */
.card .hk{font-size:10.5px;color:var(--dust);line-height:1.45;margin-top:5px}
.ctag{display:inline-block;font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.12em;border:1px solid var(--line);padding:1px 5px;margin-right:4px}
.ctag.short,.ctag.trend{color:var(--tracer);border-color:#2c4358}
.ctag.long{color:var(--ok);border-color:#2c5136}
.ctag.teaser{color:var(--amber);border-color:var(--amber-dim)}
.ctag.fmt-cyc{cursor:pointer}
.plat-badge{display:inline-block;font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.12em;padding:1px 6px;border:1px solid;margin-right:4px;cursor:pointer}
.card.pl-yt{border-left:3px solid var(--red)}       .plat-badge.pl-yt{color:var(--red);border-color:#5c2424}
.card.pl-tiktok{border-left:3px solid var(--tracer)} .plat-badge.pl-tiktok{color:var(--tracer);border-color:#2c4358}
.card.pl-shorts{border-left:3px solid var(--amber)}  .plat-badge.pl-shorts{color:var(--amber);border-color:var(--amber-dim)}
.card.pl-ig{border-left:3px solid #B784F0}           .plat-badge.pl-ig{color:#B784F0;border-color:#5b3f7a}
/* agent status bar + incoming */
.cstudio-bar{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(11,14,19,.5);padding:8px 10px;margin-bottom:8px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em}
.cstudio-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--dust);flex:none}
.cstudio-bar.working{border-color:var(--amber-dim)} .cstudio-bar.working .dot{background:var(--ok);animation:pulse 1.6s infinite}
.cstudio-bar .who{color:var(--concrete)} .cstudio-bar .note{color:var(--amber)} .cstudio-bar .ago{margin-left:auto;color:var(--dust)}
.cstudio-in{display:flex;align-items:center;gap:10px;border:1px solid var(--amber-dim);background:rgba(255,170,60,.06);padding:7px 10px;margin-bottom:8px;font-size:11px;color:var(--concrete)}
.cstudio-in .n{color:var(--amber);font-weight:600}
/* "why pass?" reject dropdown */
.rejmenu{position:absolute;top:4px;right:4px;z-index:60;background:#161C29;border:1px solid var(--amber-dim);min-width:172px;box-shadow:0 8px 24px rgba(0,0,0,.55)}
.rejmenu .rh{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.14em;color:var(--amber);padding:7px 10px;border-bottom:1px solid var(--line)}
.rejmenu button{display:block;width:100%;text-align:left;background:transparent;border:0;color:var(--concrete);font-size:11px;padding:7px 10px;cursor:pointer;font-family:inherit}
.rejmenu button:hover{background:rgba(255,170,60,.12);color:var(--amber)}
.rejmenu button.plain{color:var(--dust);border-top:1px solid var(--line)}
.rejmenu input{display:block;width:100%;box-sizing:border-box;background:#0A0D13;border:0;border-top:1px solid var(--line);color:var(--concrete);font-family:'IBM Plex Mono';font-size:11px;padding:7px 10px}
.rejmenu input::placeholder{color:var(--dust)}
/* publish launchpad */
.pub-btn{display:inline-block;font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.14em;border:1px solid var(--amber-dim);color:var(--amber);padding:1px 6px;margin-left:2px;cursor:pointer}
.pub-btn:hover{background:rgba(255,170,60,.12)}
#pub{position:fixed;inset:0;z-index:905;background:rgba(5,7,11,.64);display:none;align-items:flex-start;justify-content:center;padding-top:8vh;backdrop-filter:blur(3px)}
#pub.show{display:flex}
#pubbox{width:min(560px,93vw);max-height:84vh;overflow:auto;background:var(--steel);border:1px solid var(--amber-dim);box-shadow:0 30px 80px rgba(0,0,0,.8);scrollbar-width:thin}
#pubbox .ph{position:sticky;top:0;background:var(--steel);font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.18em;color:var(--amber);padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2}
#pubbox .ph .pt{color:var(--concrete);letter-spacing:.02em;font-weight:600}
#pubbox .ph .x{margin-left:auto;cursor:pointer;color:var(--dust);font-size:14px}
#pubbox .ph .x:hover{color:var(--red)}
#pubbody{padding:14px}
.publabel{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.2em;color:var(--dust);margin:14px 0 6px;display:flex;align-items:center;gap:8px}
.publabel:first-child{margin-top:0}
.publabel b{color:var(--amber)}
#pubcap{width:100%;min-height:118px;background:#0A0D13;border:1px solid var(--line);color:var(--concrete);font-family:'IBM Plex Mono';font-size:12px;line-height:1.6;padding:10px;resize:vertical;caret-color:var(--amber)}
.pubgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pubup{display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 6px;border:1px solid var(--line);background:var(--steel2);color:var(--concrete);cursor:pointer;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.12em;text-align:center}
.pubup:hover{border-color:var(--amber);color:var(--amber)}
.pubup.pri{border-color:var(--amber-dim);box-shadow:inset 0 0 0 1px rgba(255,170,60,.14)}
.pubup .pi{font-size:18px;line-height:1}
.pubup .ps{font-size:8px;letter-spacing:.1em;color:var(--dust)}
.pubrow2{display:flex;gap:8px;margin-top:16px}
.pubbtn{flex:1;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;border:1px solid var(--line);color:var(--dust);background:transparent;padding:11px;cursor:pointer}
.pubbtn:hover{border-color:var(--amber);color:var(--amber)}
.pubbtn.go{border-color:#2c5136;color:var(--ok)} .pubbtn.go:hover{background:rgba(123,216,138,.1)}
/* analytics */
.an-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.an-plat{border:1px solid var(--line);border-top-width:2px;background:linear-gradient(160deg,#181f2e,#10141d);padding:11px 12px}
.an-plat.tiktok{border-top-color:var(--tracer)} .an-plat.youtube{border-top-color:var(--red)} .an-plat.instagram{border-top-color:#B784F0}
.an-plat .pn{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.16em;color:var(--dust)}
.an-plat .pf{font-family:'Chakra Petch';font-weight:700;font-size:22px;color:#EDEFF4;line-height:1.05;margin-top:5px}
.an-plat .pl{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.14em;color:var(--dust);margin-top:1px}
.an-plat .pv{font-family:'IBM Plex Mono';font-size:10px;color:var(--amber);margin-top:7px}
#anchart{display:block;width:100%;height:140px;background:#0A0D13;border:1px solid var(--line);margin-top:6px}
.an-leg{display:flex;gap:14px;font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.1em;color:var(--dust);margin-top:7px}
.an-leg i{display:inline-block;width:9px;height:3px;margin-right:5px;vertical-align:middle}
.an-top{display:flex;gap:10px;align-items:baseline;padding:8px 2px;border-bottom:1px dashed #1c2434;font-size:12px}
.an-top .rk{font-family:'IBM Plex Mono';font-size:11px;color:var(--amber);min-width:20px}
.an-top .tt{color:var(--concrete);flex:1;line-height:1.4}
.an-top .vv{font-family:'IBM Plex Mono';font-size:10px;color:var(--dust);white-space:nowrap}
.an-top .pill{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.1em;padding:1px 5px;border:1px solid var(--line)}

/* =====================  LIVE FEED  ===================== */
/* Point this at your hosted feed.json. When set, the OS polls it every
   POLL_MS and merges radio/tasks/ship over the embedded snapshot, so dev
   updates appear without re-downloading. Leave blank to run fully offline. */
const FEED_URL = "https://raw.githubusercontent.com/fentynals/ybos2/main/feed.json"; // raw repo — no Pages build, works on any host
const POLL_MS = 15000;
let LIVE = { on:false, last:null };
async function pullFeed(){
  if(!FEED_URL) return;
  try{
    const r = await fetch(FEED_URL + (FEED_URL.includes("?")?"&":"?") + "cb=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    if(Array.isArray(j.radio)) DATA.radio = j.radio;
    if(Array.isArray(j.ship))  DATA.ship  = j.ship;
    if(Array.isArray(j.bugs))  DATA.bugs  = j.bugs;
    if(j.meta && 'stats' in j.meta) DATA.stats = j.meta.stats;
    if(j.meta && 'analytics' in j.meta) DATA.analytics = j.meta.analytics;
    if(j.meta && j.meta.contentAgent) DATA.contentAgent = j.meta.contentAgent;
    if(j.tasks) DATA.feedTasks = j.tasks;       // shared board (agents write this); the human board lives in localStorage
    if(Array.isArray(j.content)) DATA.feedContent = j.content;
    if(j.meta && j.meta.version){ const v=document.getElementById('ver'); if(v) v.textContent=j.meta.version; }
    LIVE.on = true; LIVE.last = new Date();
    window.dispatchEvent(new CustomEvent("feed:update"));
  }catch(e){ LIVE.on=false; }
  updateLiveBadge();
}
function updateLiveBadge(){
  const el=document.getElementById("livebadge"); if(!el)return;
  if(LIVE.on){ el.innerHTML='<i style="background:#7BD88A"></i>LIVE · '+(LIVE.last?LIVE.last.toLocaleTimeString("en-US",{hour12:false}):""); }
  else { el.innerHTML='<i style="background:#E23B3B"></i>OFFLINE'; }
}

<script>
/* =====================  WINDOW MANAGER  ===================== */
const desk = document.getElementById('desk');
const dock = document.getElementById('dock');
const WINS = {};
let z = 20;
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---- window geometry persistence + resize/maximize ---- */
const WKEY='ybos.win.', MINW=260, MINH=140;
function loadGeom(id){ try{ return JSON.parse(localStorage.getItem(WKEY+id)); }catch(e){ return null; } }
function normalGeom(w){ const el=w.el;
  if(w.max&&w.prev) return {...w.prev};
  return { left:parseFloat(el.style.left)||0, top:parseFloat(el.style.top)||0, width:el.offsetWidth, height:el.offsetHeight }; }
function saveGeom(id){ const w=WINS[id]; if(!w) return; const g=normalGeom(w); g.max=!!w.max;
  try{ localStorage.setItem(WKEY+id, JSON.stringify(g)); }catch(e){} }
function applyMax(el){ el.style.left='0px'; el.style.top='0px'; el.style.width=desk.clientWidth+'px'; el.style.height=desk.clientHeight+'px'; }
function setMaxBtn(w){ const b=w.el.querySelector('[data-a="max"]'); if(b){ b.textContent=w.max?'❐':'▢'; b.title=w.max?'restore':'maximize'; } }
function winResized(id){ window.dispatchEvent(new CustomEvent('win:resize',{detail:{id}})); }
function toggleMax(id){ const w=WINS[id], el=w.el;
  if(w.max){ const p=w.prev||{left:40,top:40,width:520,height:360};
    el.style.left=p.left+'px'; el.style.top=p.top+'px'; el.style.width=p.width+'px'; el.style.height=p.height+'px'; w.max=false; }
  else { w.prev=normalGeom(w); applyMax(el); w.max=true; }
  setMaxBtn(w); saveGeom(id); winResized(id); }
function unmax(id){ const w=WINS[id]; if(w.max){ w.max=false; setMaxBtn(w); } }

function mkWin(id, title, icon, x, y, w, h, open=true){
  const el = document.createElement('div');
  el.className = 'win'; el.style.left=x+'px'; el.style.top=y+'px';
  el.style.width=w+'px'; el.style.height=h+'px'; el.style.zIndex=++z;
  el.innerHTML = `<div class="winhead"><span class="tape"></span><span class="t">${title}</span><span class="grow"></span>
    <button class="winbtn" data-a="max" title="maximize">▢</button><button class="winbtn" data-a="min" title="minimize">–</button><button class="winbtn" data-a="x" title="close">×</button></div>
    <div class="winbody" id="body-${id}"></div>
    <div class="rz rz-r"></div><div class="rz rz-b"></div><div class="rz rz-br"></div>`;
  desk.appendChild(el);
  const rec = WINS[id] = {el, title, icon, open, max:false, prev:null};
  if(!open) el.classList.add('min');

  const head = el.querySelector('.winhead');
  const focus = ()=>{ el.style.zIndex=++z; document.querySelectorAll('.win').forEach(w=>w.classList.remove('focus')); el.classList.add('focus'); };
  el.addEventListener('pointerdown', focus);
  // drag
  head.addEventListener('pointerdown', e=>{
    if(e.target.closest('.winbtn')) return;
    focus(); unmax(id);
    const sx=e.clientX-el.offsetLeft, sy=e.clientY-el.offsetTop;
    const mv=ev=>{ el.style.left=Math.max(-el.offsetWidth*0.6,Math.min(innerWidth-60,ev.clientX-sx))+'px';
                   el.style.top =Math.max(0,Math.min(innerHeight-140,ev.clientY-sy))+'px'; };
    const up=()=>{ removeEventListener('pointermove',mv); removeEventListener('pointerup',up); saveGeom(id); };
    addEventListener('pointermove',mv); addEventListener('pointerup',up);
  });
  // resize — right edge, bottom edge, corner
  const startResize=(e,dir)=>{ e.preventDefault(); e.stopPropagation(); focus(); unmax(id);
    const sx=e.clientX, sy=e.clientY, sw=el.offsetWidth, sh=el.offsetHeight;
    const mv=ev=>{ if(dir.includes('e')) el.style.width =Math.max(MINW, sw+(ev.clientX-sx))+'px';
                   if(dir.includes('s')) el.style.height=Math.max(MINH, sh+(ev.clientY-sy))+'px'; };
    const up=()=>{ removeEventListener('pointermove',mv); removeEventListener('pointerup',up); saveGeom(id); winResized(id); };

  el.querySelector('.rz-r').addEventListener('pointerdown', e=>startResize(e,'e'));
  el.querySelector('.rz-b').addEventListener('pointerdown', e=>startResize(e,'s'));
  el.querySelector('.rz-br').addEventListener('pointerdown', e=>startResize(e,'se'));

  head.querySelector('[data-a="max"]').onclick = ()=>toggleMax(id);

  }

/* =====================  BG CANVAS: patrol grid  ===================== */
const bg = document.getElementById('bg'), bctx = bg.getContext('2d');
let patrols = [];
function sizeBg(){ bg.width=innerWidth; bg.height=innerHeight;
  patrols = Array.from({length:14},()=>({
    x:Math.random()*bg.width, y:Math.random()*bg.height,
    a:Math.random()*Math.PI*2, s:.25+Math.random()*.5, hue:Math.random()<.25
  }));
}
sizeBg(); addEventListener('resize', sizeBg);
function drawBg(){
  bctx.clearRect(0,0,bg.width,bg.height);
  // street grid
  bctx.strokeStyle='rgba(35,44,62,.35)'; bctx.lineWidth=1;
  const G=64;
  for(let x=0;x<bg.width;x+=G){ bctx.beginPath(); bctx.moveTo(x,0); bctx.lineTo(x,bg.height); bctx.stroke(); }
  for(let y=0;y<bg.height;y+=G){ bctx.beginPath(); bctx.moveTo(0,y); bctx.lineTo(bg.width,y); bctx.stroke(); }
  // patrols: dots that follow the grid like distant cars
  patrols.forEach(p=>{
    if(!reduced){
      p.x+=Math.cos(p.a)*p.s; p.y+=Math.sin(p.a)*p.s;
      if(Math.random()<.006) p.a = Math.round((p.a+ (Math.random()<.5?1:-1)*Math.PI/2)/(Math.PI/2))*(Math.PI/2);
      if(p.x<0)p.x=bg.width; if(p.x>bg.width)p.x=0; if(p.y<0)p.y=bg.height; if(p.y>bg.height)p.y=0;
    }
    const c = p.hue ? 'rgba(226,59,59,' : 'rgba(255,170,60,';
    bctx.fillStyle=c+'0.5)'; bctx.fillRect(p.x-1.5,p.y-1.5,3,3);
    bctx.fillStyle=c+'0.08)'; bctx.fillRect(p.x-6,p.y-6,12,12);
  });
  requestAnimationFrame(drawBg);
}

});

    const incoming=(DATA.feedContent||[]).filter(i=>!have.has(norm(i.t)));
    if(incoming.length){
      inEl.innerHTML=`<div class="cstudio-in"><span class="n">${incoming.length}</span>&nbsp;new idea${incoming.length>1?'s':''} from content-creator
        <span style="flex:1"></span><button class="tbbtn" id="ctmerge">MERGE →</button></div>`;
      inEl.querySelector('#ctmerge').onclick=()=>{ incoming.forEach(i=>ideas.unshift(clone({...i,col:0}))); save(); render(); renderTop(); flash('merged '+incoming.length+' agent idea(s) into IDEAS'); };
    } else inEl.innerHTML='';
  }

  function render(){
    kb.innerHTML='';
    COLS.forEach((cn,ci)=>{
      const col=document.createElement('div'); col.className='kcol'; col.dataset.col=ci;
      const items=ideas.filter(t=>t.col===ci);
      col.innerHTML=`<h4>${cn}<span class="cnt">${items.length}</span></h4>`;
      items.forEach(t=>{
        const idx=ideas.indexOf(t), pl=PLATS.includes(t.plat)?t.plat:'tiktok';
        const c=document.createElement('div'); c.className='card pl-'+pl; c.draggable=true;
        c.innerHTML=`<span class="del" title="delete">×</span>
          <div class="ct">${esc(t.t)}</div>
          ${t.hook?`<div class="hk">${esc(t.hook)}</div>`:''}
          <div class="cm"><span class="plat-badge pl-${pl} plat-cyc" title="click: change platform">${PLABEL[pl]}</span><span class="ctag ${t.fmt} fmt-cyc" title="click: change format">${(t.fmt||'').toUpperCase()}</span><span class="pub-btn" title="publish — caption + open uploaders">⤴ PUBLISH</span></div>`;
        c.addEventListener('dragstart',e=>e.dataTransfer.setData('text', idx));
        c.querySelector('.del').addEventListener('click',ev=>{ ev.stopPropagation(); openReject(c, t); });
        c.querySelector('.fmt-cyc').addEventListener('click',ev=>{ ev.stopPropagation(); t.fmt=FMTS[(FMTS.indexOf(t.fmt)+1)%FMTS.length]; save(); render(); });
        c.querySelector('.plat-cyc').addEventListener('click',ev=>{ ev.stopPropagation(); t.plat=PLATS[(PLATS.indexOf(pl)+1)%PLATS.length]; save(); render(); });
        c.querySelector('.pub-btn').addEventListener('click',ev=>{ ev.stopPropagation(); openPublish(t); });
        col.appendChild(c);
      });
      col.addEventListener('dragover',e=>{ e.preventDefault(); col.classList.add('dragover'); });
      col.addEventListener('dragleave',()=>col.classList.remove('dragover'));
      col.addEventListener('drop',e=>{ e.preventDefault(); col.classList.remove('dragover');
        const i=+e.dataTransfer.getData('text'); if(!isNaN(i)&&ideas[i]){ ideas[i].col=ci; save(); render(); } });
      kb.appendChild(col);
    });
  }
  function openReject(card, t){
    const existing=card.querySelector('.rejmenu'); if(existing){ existing.remove(); return; }
    document.querySelectorAll('#body-content .rejmenu').forEach(m=>m.remove());
    const menu=document.createElement('div'); menu.className='rejmenu';
    menu.innerHTML='<div class="rh">WHY PASS? — TEACHES CONTENT-CREATOR</div>'+
      REASONS.map(r=>`<button data-r="${r[0]}">${esc(r[1])}</button>`).join('')+
      '<input class="rejin" placeholder="or type your own reason… (Enter)" autocomplete="off">'+
      '<button class="plain" data-r="__nolog">just delete (no note)</button>';
    card.appendChild(menu);
    const drop=(reason,note)=>{ if(reason){ const n=logReject(t, reason, note); updateTeach(); flash('taught content-creator: “'+(note||reason)+'” · '+n+' notes logged'); }
      const i=ideas.indexOf(t); if(i>=0) ideas.splice(i,1); save(); render(); renderTop(); };
    menu.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',ev=>{ ev.stopPropagation();
      if(btn.dataset.r==='__nolog') drop(null); else drop(btn.dataset.r, btn.textContent); }));
    const inp=menu.querySelector('.rejin');
    inp.addEventListener('click',ev=>ev.stopPropagation());
    inp.addEventListener('keydown',ev=>{ ev.stopPropagation(); if(ev.key==='Enter'){ const v=inp.value.trim(); if(v) drop('custom', v); } });
    setTimeout(()=>inp.focus(),0);
  }
  // ---- publish launchpad ----
  const pub=document.getElementById('pub');
  function closePub(){ pub.classList.remove('show'); }
  function markPosted(t){
    t.col=3; t.postedAt=new Date().toISOString();
    try{ let log=JSON.parse(localStorage.getItem(PKEY)||'[]');
      log.unshift({t:t.t, plat:t.plat, fmt:t.fmt, postedAt:t.postedAt}); log=log.slice(0,300);
      localStorage.setItem(PKEY, JSON.stringify(log)); }catch(e){}
    save(); render();
  }
  function openPublish(t){
    const pl=PLATS.includes(t.plat)?t.plat:'tiktok', primary=(pl==='shorts'?'yt':pl);
    document.getElementById('pub-title').textContent=t.t;
    document.getElementById('pub-plat').textContent='· '+(PLABEL[pl]||'');
    const cap=document.getElementById('pubcap'); cap.value=capFor(t);
    const up=document.getElementById('pub-uploaders'); up.innerHTML='';
    UPLOADERS.forEach(u=>{
      const a=document.createElement('div'); a.className='pubup'+(u.key===primary?' pri':'');
      a.innerHTML=`<span class="pi">${u.ic}</span>${u.label}<span class="ps">${u.key===primary?'★ this card':'cross-post'}</span>`;
      a.onclick=()=>window.open(u.url,'_blank','noopener');
      up.appendChild(a);
    });
    document.getElementById('pub-copy').onclick=async()=>{
      try{ await navigator.clipboard.writeText(cap.value); flash('caption copied — paste it into the uploader'); }
      catch(e){ cap.focus(); cap.select(); flash('select + copy the caption (clipboard blocked)'); } };
    document.getElementById('pub-posted').onclick=()=>{ markPosted(t); closePub(); flash('“'+t.t+'” → POSTED · logged for analytics'); };
    pub.classList.add('show');
  }
  document.getElementById('pub-x').onclick=closePub;
  document.getElementById('pub-close').onclick=closePub;
  pub.addEventListener('click',e=>{ if(e.target===pub) closePub(); });
  addEventListener('keydown',e=>{ if(e.key==='Escape'&&pub.classList.contains('show')) closePub(); });
  function updateTeach(){ const el=b.querySelector('#ctteach'); if(el) el.textContent='TASTE ✎ '+teachCount(); }
  const add=()=>{ const inp=b.querySelector('#ctnew'), v=inp.value.trim(); if(!v)return;
    ideas.unshift({t:v,hook:'',fmt:'short',plat:'tiktok',col:0}); inp.value=''; save(); render(); renderTop(); };
  b.querySelector('#ctadd').onclick=add;
  b.querySelector('#ctnew').addEventListener('keydown',e=>{ if(e.key==='Enter')add(); });
  b.querySelector('#ctexport').onclick=async()=>{ const json=JSON.stringify(ideas,null,2);
    try{ await navigator.clipboard.writeText(json); flash('copied '+ideas.length+' ideas — paste into feed.json content[]'); }
    catch(e){ flash('clipboard blocked — JSON logged to console'); console.log(json); } };
  b.querySelector('#ctteach').onclick=async()=>{ let log=[]; try{ log=JSON.parse(localStorage.getItem(RKEY)||'[]'); }catch(e){}
    if(!log.length){ flash('no taste notes yet — click × on an idea and pick a reason'); return; }
    const json=JSON.stringify(log,null,2);
    try{ await navigator.clipboard.writeText(json); flash('copied '+log.length+' taste notes — paste into feed.json rejections[] or hand to content-creator'); }
    catch(e){ flash('clipboard blocked — JSON logged to console'); console.log(json); } };
  document.addEventListener('click',e=>{ if(!e.target.closest('.rejmenu')&&!e.target.closest('.del')) document.querySelectorAll('#body-content .rejmenu').forEach(m=>m.remove()); });
  renderTop(); render(); updateTeach();
  window.addEventListener('feed:update', renderTop);
})();

/* ---- ANALYTICS (social stats, auto-pulled into feed.meta.analytics by the sync job) ---- */
(function(){
  const b = mkWin('analytics','ANALYTICS','▦', 18, H*.56, Math.min(600,W*.44), Math.min(320,H*.4), true);
  const esc=s=>(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=> n==null?'—' : n>=1e6?(n/1e6).toFixed(n>=1e7?0:1)+'M' : n>=1e3?(n/1e3).toFixed(n>=1e4?0:1)+'k' : (''+n);
  const ago=ts=>{ if(!ts) return 'never'; const s=(Date.now()-new Date(ts).getTime())/1000;
    if(s<60) return 'just now'; if(s<3600) return Math.round(s/60)+'m ago'; if(s<86400) return Math.round(s/3600)+'h ago'; return Math.round(s/86400)+'d ago'; };
  const PMETA=[
    {key:'tiktok',    name:'TIKTOK',    cls:'tiktok',    foll:'followers',   fl:'FOLLOWERS'},
    {key:'youtube',   name:'YOUTUBE',   cls:'youtube',   foll:'subscribers', fl:'SUBSCRIBERS'},
    {key:'instagram', name:'INSTAGRAM', cls:'instagram', foll:'followers',   fl:'FOLLOWERS'},
  ];
  const NP={tiktok:'tiktok',tt:'tiktok',youtube:'youtube',yt:'youtube',shorts:'shorts',instagram:'instagram',ig:'instagram',reels:'instagram'};
  const SERIES=[['tiktok','#9FD1FF'],['youtube','#E23B3B'],['instagram','#B784F0']];
  function drawChart(series){
    const cv=document.getElementById('anchart'); if(!cv) return;
    const w=cv.clientWidth||520, h=140; cv.width=w; cv.height=h;
    const ctx=cv.getContext('2d'); ctx.clearRect(0,0,w,h);
    if(!series || series.length<2){ ctx.fillStyle='#6B7385'; ctx.font="10px 'IBM Plex Mono'"; ctx.fillText('not enough data yet',12,h/2); return; }
    let max=1; series.forEach(s=>SERIES.forEach(([k])=>{ if(typeof s[k]==='number'&&s[k]>max)max=s[k]; }));
    const padL=6,padR=6,padT=10,padB=12, gw=w-padL-padR, gh=h-padT-padB;
    const X=i=>padL+(gw*i/(series.length-1)), Y=v=>padT+gh-(gh*(v||0)/max);
    ctx.strokeStyle='rgba(35,44,62,.6)'; ctx.lineWidth=1;
    [0,.5,1].forEach(f=>{ const y=padT+gh*f; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); });
    SERIES.forEach(([k,c])=>{
      ctx.strokeStyle=c; ctx.lineWidth=1.8; ctx.beginPath();
      series.forEach((s,i)=>{ const x=X(i),y=Y(s[k]); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      ctx.stroke();
      const li=series.length-1; ctx.fillStyle=c; ctx.beginPath(); ctx.arc(X(li),Y(series[li][k]),2.2,0,7); ctx.fill();
    });
  }
  function render(){
    const a=DATA.analytics;
    if(!a){
      b.innerHTML=`<div class="eyebrow">SOCIAL ANALYTICS · TIKTOK · YOUTUBE · INSTAGRAM</div>
        <div class="ghwait"><b>Analytics not wired yet.</b><br>Auto-pull runs as a scheduled sync that authorizes each
        account and writes numbers into <span class="mono" style="color:var(--amber)">feed.json → meta.analytics</span>.
        Setup steps live in <span class="mono" style="color:var(--amber)">UPLOAD_ANALYTICS_PLAN.md</span>. Once it runs,
        followers, views and your top posts land here live — same pipeline as GAME HEALTH.</div>`;
      return;
    }
    const kpis=PMETA.map(p=>{ const d=a[p.key]||{};
      return `<div class="an-plat ${p.cls}"><div class="pn">${p.name}</div>
        <div class="pf">${fmt(d[p.foll])}</div><div class="pl">${p.fl}</div>
        <div class="pv">${fmt(d.views)} views · ${fmt(d.likes)} likes</div></div>`; }).join('');
    const top=(a.top||[]).slice(0,6).map((x,i)=>{ const pc=NP[(x.plat||'').toLowerCase()]||'tiktok';
      return `<div class="an-top"><span class="rk">${i+1}</span><span class="pill ${pc}">${pc.toUpperCase()}</span>
        <span class="tt">${esc(x.t||'')}</span><span class="vv">${fmt(x.views)} views</span></div>`; }).join('');
    b.innerHTML=`<div class="eyebrow">SOCIAL ANALYTICS · SYNCED ${ago(a.updated).toUpperCase()}</div>
      <div class="an-grid">${kpis}</div>
      <div class="publabel" style="margin:14px 0 0">VIEWS · LAST ${(a.series||[]).length} DAYS</div>
      <canvas id="anchart"></canvas>
      <div class="an-leg"><span><i style="background:#9FD1FF"></i>TIKTOK</span><span><i style="background:#E23B3B"></i>YOUTUBE</span><span><i style="background:#B784F0"></i>INSTAGRAM</span></div>
      ${top?`<div class="publabel" style="margin-top:14px">TOP POSTS</div>${top}`:''}`;
    drawChart(a.series||[]);
  }
  render();
  window.addEventListener('feed:update', render);
  window.addEventListener('win:resize', e=>{ if(e.detail && e.detail.id==='analytics') render(); });
})();

/* ---- CONTENT PLAN (tabbed checklists; first tab = 30-day dev journey) ---- */
(function(){
  const b = mkWin('plan','CONTENT PLAN','☑', Math.min(360,W*.26), H*.14, Math.min(560,W*.44), Math.min(520,H*.66), true);
  const KEY='ybos.plans.v1';
  const esc=s=>(''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const SEED_JOURNEY=[
    "DAY 1 of building a Roblox game: one Draco model, building the FPS core from scratch",
    "Test dummies with escalating 25 to 5000 HP, healer + zombie AI",
    "Damage numbers: white body shots, big red headshots",
    "Splitting the Draco: FULLY DRACO vs SEMI DRACO",
    "Pickup system evolution: walk-over → click → full hotbar inventory",
    "Muzzle flash + ejecting shell casings",
    "WEEK 1 RECAP: first real gunfight montage",
    "New gun: Glock 17 Extendo (blue tracers)",
    "Kill feed with device emojis (PC/mobile/console)",
    "Headshot kill SFX + heartbeat when you're almost dead",
    "ADS + recoil + aiming polish",
    "Welcome room spawn flow + death screen vignette",
    "Knockdown system: 25% chance you drop on hit",
    "WEEK 2 RECAP: XP, levels, food shop, sprint",
    "The ARP + full rifle animation set (equip/idle/reload/run/walk)",
    "FULL mobile support: run, roll, crouch, prone, sprint, shoot on touch",
    "Pistol lineup: Snubnose, Makarov, G17Gen4, G17DRUM, G2C Binary Drum",
    "The HELLCAT arrives (A-Chassis)",
    "SafeZone system: shields, highlights, leave countdown",
    "ATMs, cash pickups, and the hostility system",
    "WEEK 3 RECAP: Gun Dealer + Clone Card Dealer crime economy",
    "Fists + delivery missions",
    "THE CITY PLAN: revealing the full building list",
    "The 4 TURFS (gang headquarters)",
    "ICEBLOX jewelry store + its safezone",
    "THE MINESHAFT",
    "Chop shop, dealership, gun store tour",
    "Decoration pass: making the block feel alive",
    "Behind the scenes: the live analytics dashboard",
    "FULL GAME TOUR + what's next for Block Simulator",
  ];
  const seed=()=>({ active:0, tabs:[ { name:"HEADTAP DEVELOPMENT JOURNY", items:SEED_JOURNEY.map(t=>({t,done:false})) } ] });
  let store=load();
  function load(){ try{ const r=localStorage.getItem(KEY); if(r){ const p=JSON.parse(r); if(p&&Array.isArray(p.tabs)&&p.tabs.length) return p; } }catch(e){} return seed(); }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){} }
  const clampActive=()=>{ if(store.active>=store.tabs.length) store.active=store.tabs.length-1; if(store.active<0) store.active=0; };

  b.innerHTML=`<div class="eyebrow">CONTENT PLANS · TABS = SEPARATE PLANS · SAVED IN THIS BROWSER</div>
    <div class="plan-tabs" id="plan-tabs"></div><div id="plan-body"></div>`;
  const tabsEl=b.querySelector('#plan-tabs'), bodyEl=b.querySelector('#plan-body');

  function renderTabs(){
    tabsEl.innerHTML = store.tabs.map((t,i)=>{
      const done=t.items.filter(x=>x.done).length;
      return `<button class="plan-tab ${i===store.active?'on':''}" data-i="${i}">${esc(t.name)||'UNTITLED'}<span class="tc">${done}/${t.items.length}</span></button>`;
    }).join('') + `<button class="plan-tab addtab" id="plan-addtab">+ NEW TAB</button>`;
    tabsEl.querySelectorAll('.plan-tab[data-i]').forEach(el=>el.onclick=()=>{ store.active=+el.dataset.i; save(); render(); });
    tabsEl.querySelector('#plan-addtab').onclick=()=>{
      store.tabs.push({name:'NEW PLAN', items:[]}); store.active=store.tabs.length-1; save(); render();
      const ni=bodyEl.querySelector('.plan-name'); if(ni){ ni.focus(); ni.select(); }
    };
  }
  function renderBody(){
    clampActive();
    const tab=store.tabs[store.active];
    const done=tab.items.filter(x=>x.done).length, tot=tab.items.length, pct=tot?Math.round(done/tot*100):0;
    bodyEl.innerHTML=`
      <div class="plan-head"><input class="plan-name" value="${esc(tab.name)}" placeholder="plan name…" spellcheck="false">
        ${store.tabs.length>1?'<button class="plan-deltab">DELETE TAB</button>':''}</div>
      <div class="plan-prog"><div class="pl"><b>${done}/${tot}</b> done<span>${pct}%</span></div>
        <div class="track"><i style="--p:${tot?done/tot:0}"></i></div></div>
      <div id="plan-items">${ tot ? tab.items.map((it,i)=>`
        <div class="plan-item ${it.done?'done':''}" data-i="${i}"><span class="num">${i+1}</span>
          <span class="cb">${it.done?'✓':''}</span><span class="pt">${esc(it.t)}</span><span class="pdel" title="delete">×</span>
        </div>`).join('') : '<div class="dim" style="font-size:12px;padding:8px 2px">no items yet — add one below</div>' }</div>
      <div class="tbctl plan-addrow"><input id="plan-new" placeholder="add item… (Enter)" autocomplete="off"><button class="tbbtn" id="plan-addit">+ ADD</button></div>`;
    const nm=bodyEl.querySelector('.plan-name');
    nm.addEventListener('input',()=>{ tab.name=nm.value; save(); renderTabs(); });
    const delt=bodyEl.querySelector('.plan-deltab');
    if(delt) delt.onclick=()=>{ store.tabs.splice(store.active,1); store.active=Math.max(0,store.active-1); save(); render(); };
    bodyEl.querySelectorAll('.plan-item').forEach(row=>{
      const i=+row.dataset.i, toggle=()=>{ tab.items[i].done=!tab.items[i].done; save(); render(); };
      row.querySelector('.cb').onclick=toggle;
      row.querySelector('.pt').onclick=toggle;
      row.querySelector('.pdel').onclick=ev=>{ ev.stopPropagation(); tab.items.splice(i,1); save(); render(); };
    });
    const add=()=>{ const inp=bodyEl.querySelector('#plan-new'), v=inp.value.trim(); if(!v)return; tab.items.push({t:v,done:false}); save(); render(); const n=bodyEl.querySelector('#plan-new'); if(n) n.focus(); };
    bodyEl.querySelector('#plan-addit').onclick=add;
    bodyEl.querySelector('#plan-new').addEventListener('keydown',e=>{ if(e.key==='Enter')add(); });
  }
  function render(){ renderTabs(); renderBody(); }
  render();
})();

renderDock();

/* live: start polling + re-render windows when feed changes */
updateLiveBadge();
pullFeed();
setInterval(pullFeed, POLL_MS);
/* GAME HEALTH, BUGS, AGENTS each own their own feed:update listener.
   Here we just keep the topbar shipped count in sync. */
window.addEventListener('feed:update', ()=>{
  const sh=document.getElementById('tb-shipped'); if(sh) sh.textContent = DATA.ship.length;
});
