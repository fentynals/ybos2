<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUNGSBRUH.OS — DISPATCH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --asphalt:#0B0E13; --steel:#131822; --steel2:#1A2130; --line:#232C3E;
  --amber:#FFAA3C; --amber-dim:#8a5a1e; --red:#E23B3B; --tracer:#9FD1FF;
  --concrete:#C9CDD6; --dust:#6B7385; --ok:#7BD88A;
  --hazard:repeating-linear-gradient(-45deg,var(--amber) 0 10px,#151a24 10px 20px);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--asphalt); color:var(--concrete);
  font-family:'Chakra Petch',sans-serif; user-select:none;
}
canvas#bg{position:fixed;inset:0;z-index:0}
/* ===== scanline + vignette atmosphere ===== */
body::after{
  content:"";position:fixed;inset:0;z-index:99;pointer-events:none;
  background:
    radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px);
}
/* ===== boot ===== */
#boot{
  position:fixed;inset:0;z-index:1000;background:#05070B;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  transition:opacity .6s;cursor:pointer;
}
#boot.gone{opacity:0;pointer-events:none}
#bootlogo{font-family:'Archivo Black';font-size:clamp(34px,6vw,72px);letter-spacing:.04em;color:var(--red);
  text-shadow:0 0 34px rgba(226,59,59,.55);}
#bootlogo span{color:var(--amber)}
#bootlog{font-family:'IBM Plex Mono';font-size:12px;color:var(--dust);margin-top:26px;width:min(560px,86vw);height:180px;overflow:hidden;line-height:1.7}
#bootlog .ok{color:var(--ok)} #bootlog .warn{color:var(--amber)}
#boothint{font-family:'IBM Plex Mono';font-size:10px;color:#3a4254;margin-top:18px;letter-spacing:.3em}
/* ===== top bar ===== */
#topbar{
  position:fixed;top:0;left:0;right:0;height:38px;z-index:500;
  display:flex;align-items:center;gap:18px;padding:0 14px;
  background:linear-gradient(180deg,rgba(19,24,34,.94),rgba(19,24,34,.78));
  border-bottom:1px solid var(--line);backdrop-filter:blur(6px);
  font-family:'IBM Plex Mono';font-size:11px;
}
#topbar .brand{font-family:'Archivo Black';font-size:13px;color:var(--red);letter-spacing:.06em}
#topbar .brand em{font-style:normal;color:var(--amber)}
#topbar .stat{color:var(--dust)} #topbar .stat b{color:var(--concrete);font-weight:500}
#topbar .grow{flex:1}
#clock{color:var(--amber);letter-spacing:.08em}
#usage{display:flex;align-items:center;gap:6px;color:var(--dust)}
#usage .bar{width:80px;height:5px;background:var(--steel2);border:1px solid var(--line)}
#usage .bar i{display:block;height:100%;background:var(--amber);width:0%;transition:width .8s ease}
.kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:3px;padding:1px 5px;color:var(--dust);font-size:10px}
/* ===== desktop + windows ===== */
#desk{position:fixed;inset:38px 0 54px 0;z-index:10}
.win{
  position:absolute;min-width:300px;background:rgba(17,22,32,.93);
  border:1px solid var(--line);box-shadow:0 18px 60px rgba(0,0,0,.6),0 0 0 1px rgba(0,0,0,.4);
  display:flex;flex-direction:column;backdrop-filter:blur(4px);
}
.win.focus{border-color:var(--amber-dim);box-shadow:0 24px 70px rgba(0,0,0,.75),0 0 24px rgba(255,170,60,.07)}
.win.min{display:none}
.winhead{
  height:30px;display:flex;align-items:center;gap:10px;padding:0 10px;cursor:grab;
  background:linear-gradient(180deg,#1B2231,#161C29);border-bottom:1px solid var(--line);
  font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.18em;color:var(--dust);
}
.winhead:active{cursor:grabbing}
.winhead .tape{width:26px;height:8px;background:var(--hazard);opacity:.8}
.winhead .t{color:var(--concrete)}
.winhead .grow{flex:1}
.winbtn{width:16px;height:16px;border:1px solid var(--line);background:transparent;color:var(--dust);
  font-family:'IBM Plex Mono';font-size:9px;line-height:1;cursor:pointer;display:grid;place-items:center}
.winbtn:hover{border-color:var(--amber);color:var(--amber)}
.winbody{flex:1;overflow:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.winbody::-webkit-scrollbar{width:6px}.winbody::-webkit-scrollbar-thumb{background:var(--line)}
/* ===== dock ===== */
#dock{
  position:fixed;bottom:0;left:0;right:0;height:54px;z-index:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(0deg,rgba(11,14,19,.96),rgba(11,14,19,.7));
  border-top:1px solid var(--line);
}
.dockbtn{
  height:38px;padding:0 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  border:1px solid var(--line);background:var(--steel);color:var(--dust);
  font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em;position:relative;
  transition:transform .12s,border-color .12s,color .12s;
}
.dockbtn:hover{transform:translateY(-4px);border-color:var(--amber);color:var(--concrete)}
.dockbtn.open{color:var(--amber);border-color:var(--amber-dim)}
.dockbtn.open::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;background:var(--amber);border-radius:50%}
.dockbtn .ic{font-size:14px}
/* ===== shared bits ===== */
.eyebrow{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.3em;color:var(--amber);margin-bottom:6px}
.h1{font-family:'Archivo Black';font-size:22px;letter-spacing:.02em;color:#EDEFF4;line-height:1.1}
.dim{color:var(--dust)} .mono{font-family:'IBM Plex Mono'}
.chip{display:inline-block;font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.12em;
  border:1px solid var(--line);padding:2px 7px;color:var(--dust);margin:2px 3px 2px 0}
.chip.amber{color:var(--amber);border-color:var(--amber-dim)}
.chip.red{color:var(--red);border-color:#5c2424}
.chip.blue{color:var(--tracer);border-color:#2c4358}
.chip.ok{color:var(--ok);border-color:#2c5136}
.rule{height:1px;background:var(--line);margin:12px 0}
/* mission control */
.gamecard{border:1px solid var(--line);background:linear-gradient(160deg,#181f2e, #10141d);padding:16px;position:relative;overflow:hidden}
.gamecard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--hazard)}
.gamecard .gtitle{font-family:'Archivo Black';font-size:30px;color:var(--red);text-shadow:0 0 22px rgba(226,59,59,.35)}
.gamecard .gsub{font-family:'IBM Plex Mono';font-size:10px;color:var(--dust);letter-spacing:.2em;margin-top:2px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-top:14px}
.stat-cell{border:1px solid var(--line);padding:8px;background:rgba(11,14,19,.5)}
.stat-cell .n{font-family:'Chakra Petch';font-weight:700;font-size:20px;color:var(--amber)}
.stat-cell .l{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.18em;color:var(--dust);margin-top:2px}
/* goals */
.goal{margin-bottom:14px}
.goal .gl{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;margin-bottom:5px}
.goal .gl b{color:var(--concrete);font-weight:500}.goal .gl span{color:var(--amber)}
.goal .track{height:8px;background:var(--steel2);border:1px solid var(--line);position:relative}
.goal .track i{position:absolute;inset:0;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transform-origin:left;transform:scaleX(var(--p));transition:transform 1.2s cubic-bezier(.2,.8,.2,1)}
.goal .why{font-size:11px;color:var(--dust);margin-top:5px;line-height:1.5}
/* kanban */
#kb{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:10px;min-width:720px}
.kcol{background:rgba(11,14,19,.4);border:1px solid var(--line);padding:8px;min-height:200px}
.kcol h4{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.26em;color:var(--dust);padding:2px 2px 8px;display:flex;justify-content:space-between}
.kcol h4 .cnt{color:var(--amber)}
.kcol.dragover{border-color:var(--amber);background:rgba(255,170,60,.04)}
.card{border:1px solid var(--line);background:var(--steel);padding:9px;margin-bottom:8px;cursor:grab;position:relative}
.card:active{cursor:grabbing}
.card .ct{font-size:12px;line-height:1.4;color:var(--concrete)}
.card .cm{font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.1em;color:var(--dust);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.card.p-high{border-left:3px solid var(--red)}
.card.p-med{border-left:3px solid var(--amber)}
.card.p-low{border-left:3px solid var(--tracer)}
/* shiplog */
.ship{display:flex;gap:12px;padding:10px 4px;border-bottom:1px dashed #1c2434}
.ship .d{font-family:'IBM Plex Mono';font-size:9px;color:var(--dust);min-width:64px;letter-spacing:.06em;padding-top:2px}
.ship .marker{width:8px;height:8px;background:var(--amber);margin-top:4px;flex:none;box-shadow:0 0 10px rgba(255,170,60,.5)}
.ship.fix .marker{background:var(--red);box-shadow:0 0 10px rgba(226,59,59,.5)}
.ship.feat .marker{background:var(--ok);box-shadow:0 0 10px rgba(123,216,138,.4)}
.ship .st{font-size:12.5px;color:var(--concrete);line-height:1.45}
.ship .sd{font-size:11px;color:var(--dust);line-height:1.5;margin-top:3px}
/* agents */
.agent{border:1px solid var(--line);background:var(--steel);padding:10px;margin-bottom:10px}
.agent .ah{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.14em}
.agent .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite}
.agent .dot.idle{background:var(--dust);animation:none}
.agent .dot.busy{background:var(--amber)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,216,138,.5)}50%{box-shadow:0 0 0 5px rgba(123,216,138,0)}}
.agent .an{color:var(--concrete)} .agent .ar{color:var(--dust);margin-left:auto}
.agent .atask{font-size:11px;color:var(--dust);margin-top:6px;line-height:1.5}
#radio{font-family:'IBM Plex Mono';font-size:10.5px;line-height:1.85;color:#8B93A6;background:#0A0D13;border:1px solid var(--line);padding:10px;height:190px;overflow-y:auto;scrollbar-width:thin}
#radio .t{color:#3E4658;margin-right:8px}
#radio .who{color:var(--amber)}
#radio .fx{color:var(--red)} #radio .okx{color:var(--ok)} #radio .shipx{color:var(--tracer)}
/* content plan */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:700px}
.day{border:1px solid var(--line);background:rgba(11,14,19,.4);min-height:150px;padding:7px}
.day h5{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.2em;color:var(--dust);margin-bottom:7px}
.day h5 b{color:var(--amber)}
.drop{border:1px solid var(--line);background:var(--steel);padding:6px;font-size:10.5px;line-height:1.35;margin-bottom:6px;color:var(--concrete)}
.drop .tag{display:block;font-family:'IBM Plex Mono';font-size:8px;letter-spacing:.14em;margin-top:4px}
.drop.vid .tag{color:var(--red)} .drop.update .tag{color:var(--ok)} .drop.social .tag{color:var(--tracer)} .drop.event .tag{color:var(--amber)}
/* map */
#mapwrap{position:relative}
#citymap{display:block;background:#0A0D13;border:1px solid var(--line);width:100%;height:340px;cursor:crosshair}
#maptip{position:absolute;pointer-events:none;background:#161C29;border:1px solid var(--amber-dim);padding:7px 9px;font-family:'IBM Plex Mono';font-size:10px;color:var(--concrete);display:none;z-index:5;max-width:230px;line-height:1.5}
#maptip .tt{color:var(--amber);letter-spacing:.14em}
/* terminal */
#term{font-family:'IBM Plex Mono';font-size:11.5px;line-height:1.8;background:#07090E;border:1px solid var(--line);padding:10px;height:240px;overflow-y:auto}
#term .p{color:var(--amber)} #term .err{color:var(--red)} #term .out{color:#9AA3B8}
#termin{width:100%;background:transparent;border:none;outline:none;color:var(--concrete);font-family:'IBM Plex Mono';font-size:11.5px;caret-color:var(--amber)}
/* palette */
#pal{position:fixed;inset:0;z-index:900;background:rgba(5,7,11,.6);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;backdrop-filter:blur(3px)}
#pal.show{display:flex}
#palbox{width:min(520px,90vw);background:var(--steel);border:1px solid var(--amber-dim);box-shadow:0 30px 80px rgba(0,0,0,.8)}
#palin{width:100%;background:transparent;border:none;outline:none;padding:14px;font-family:'IBM Plex Mono';font-size:13px;color:var(--concrete);border-bottom:1px solid var(--line);caret-color:var(--amber)}
#pallist{max-height:300px;overflow-y:auto}
.palitem{padding:10px 14px;font-size:12px;display:flex;gap:10px;cursor:pointer;color:var(--dust)}
.palitem .pi{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.2em;color:var(--amber);min-width:60px;padding-top:1px}
.palitem.sel,.palitem:hover{background:#1E2636;color:var(--concrete)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:820px){ .win{min-width:86vw!important;width:86vw!important;left:4vw!important} }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- BOOT -->
<div id="boot">
  <div id="bootlogo">YUNGSBRUH<span>.OS</span></div>

</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="brand">YB<em>.OS</em></span>
  <span class="stat">ver <b id="ver">2.0</b></span>

</div>

<!-- DESKTOP -->
<div id="desk"></div>

<!-- DOCK -->
<div id="dock"></div>

<!-- COMMAND PALETTE -->

</div></div>

/* =====================  LIVE FEED  ===================== */
/* Point this at your hosted feed.json. When set, the OS polls it every
   POLL_MS and merges radio/tasks/ship over the embedded snapshot, so dev
   updates appear without re-downloading. Leave blank to run fully offline. */
const FEED_URL = "https://raw.githubusercontent.com/fentynals/ybos2/main/feed.json"; // raw repo — no Pages build, works on any host
const POLL_MS = 15000;
let LIVE = { on:false, last:null };
async function pullFeed(){
  if(!FEED_URL) return;
  try{
    const r = await fetch(FEED_URL + (FEED_URL.includes("?")?"&":"?") + "cb=" + Date.now(), {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    if(Array.isArray(j.radio)) DATA.radio = j.radio.map(x=>[x.who,x.cls,x.msg]);
    if(Array.isArray(j.tasks)) DATA.tasks = j.tasks;
    if(Array.isArray(j.ship))  DATA.ship  = j.ship;
    if(j.meta && j.meta.version){ const v=document.getElementById('ver'); if(v) v.textContent=j.meta.version; }
    // usage = radio buffer fill (live), overridable via meta.usage
    let u = Math.round((DATA.radio.length/60)*100);
    if(j.meta && typeof j.meta.usage === 'number') u = Math.round(j.meta.usage);
    u = Math.max(0, Math.min(100, u));
    const uf=document.getElementById('usagefill'), up=document.getElementById('usagepct');
    if(uf) uf.style.width = u + '%';
    if(up) up.textContent = u + '%';
    LIVE.on = true; LIVE.last = new Date();
    window.dispatchEvent(new CustomEvent("feed:update"));
  }catch(e){ LIVE.on=false; }
  updateLiveBadge();
}
function updateLiveBadge(){
  const el=document.getElementById("livebadge"); if(!el)return;
  if(LIVE.on){ el.innerHTML='<i style="background:#7BD88A"></i>LIVE · '+(LIVE.last?LIVE.last.toLocaleTimeString("en-US",{hour12:false}):""); }
  else { el.innerHTML='<i style="background:#E23B3B"></i>OFFLINE'; }
}
</script>

  WINS[id] = {el, title, icon, open};

  const head = el.querySelector('.winhead');
  const focus = ()=>{ el.style.zIndex=++z; document.querySelectorAll('.win').forEach(w=>w.classList.remove('focus')); el.classList.add('focus'); };
  el.addEventListener('pointerdown', focus);

  head.addEventListener('pointerdown', e=>{

                   el.style.top =Math.max(0,Math.min(innerHeight-140,ev.clientY-sy))+'px'; };

  for(let y=0;y<bg.height;y+=G){ bctx.beginPath(); bctx.moveTo(0,y); bctx.lineTo(bg.width,y); bctx.stroke(); }
  // patrols: dots that follow the grid like distant cars
  patrols.forEach(p=>{

  pallist.querySelectorAll('.palitem').forEach(el=>{
    el.onclick=()=>{ hits[+el.dataset.i].f(); hidePal(); };
  });
  return hits;
}

addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); pal.classList.contains('show')?hidePal():showPal(); }

  if(e.key==='Enter'&&hits[palSel]){hits[palSel].f();hidePal();}
});

/* ---- CITY MAP (3D isometric recon) ---- */
(function(){

  b.innerHTML = `<div class="eyebrow">HEADTAP WORLD · 3D RECON</div>

  const cv = document.getElementById('citymap'), ctx = cv.getContext('2d');
  const tip = document.getElementById('maptip');
  cv.style.cursor = 'grab';

  /* ---- palette helpers ---- */
  const STEEL=[26,34,49];
  const h2r=h=>{h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
  const mix=(a,c,t)=>[a[0]+(c[0]-a[0])*t,a[1]+(c[1]-a[1])*t,a[2]+(c[2]-a[2])*t];
  const shade=(c,f)=>`rgb(${Math.min(255,c[0]*f)|0},${Math.min(255,c[1]*f)|0},${Math.min(255,c[2]*f)|0})`;
  const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
  const BOOST={ '#FFAA3C':0.46, '#E23B3B':0.30, '#9FD1FF':0.22, '#7BD88A':0.28 };

  /* ---- build the city once: extruded blocks clustered on the real POI formation ---- */
  const WORLD=2.0, GN=13, cs=WORLD/GN, foot=cs*0.66, half=foot/2;
  const hash=(i,j)=>{let n=(i*73856093)^(j*19349663);n=(n<<13)^n;return ((n*(n*n*15731+789221)+1376312589)&0x7fffffff)/0x7fffffff;};
  const cells=[];
  for(let i=0;i<GN;i++)for(let j=0;j<GN;j++){
    const ncx=(i+0.5)/GN, ncy=(j+0.5)/GN;
    const wx=(ncx-0.5)*WORLD, wy=(ncy-0.5)*WORLD;
    let col=STEEL, infl=0, hgt=0.05+hash(i,j)*0.09;
    DATA.map.pois.forEach(p=>{
      const d=Math.hypot(p.x-ncx,p.y-ncy), w=Math.max(0,1-d/0.14);
      if(w>infl){ infl=w; col=mix(STEEL,h2r(p.c),Math.min(0.82,w*0.9)); }
      hgt += w*(BOOST[p.c]||0.2)*(0.6+0.6*hash(i*3+7,j*5+1));
    });
    cells.push({wx,wy,col,hgt:Math.min(hgt,0.62)});
  }

  /* ---- camera / projection ---- */
  let t=0, A=0.62, drag=false, lastX=0, idle=0;
  const kSy=0.52, kZ=0.86, autoV=0.0022;
  let cx=0, cy=0, SC=1;
  function size(){ cv.width=cv.clientWidth*2; cv.height=340*2; SC=cv.width/3.1; cx=cv.width/2; cy=cv.height*0.60; }
  size(); addEventListener('resize', size);
  function proj(wx,wy,z,ca,sa){ const rx=wx*ca-wy*sa, ry=wx*sa+wy*ca; return [cx+rx*SC, cy+ry*SC*kSy-z*SC*kZ, ry]; }

  function drawGround(ca,sa){
    const g=[proj(-1,-1,0,ca,sa),proj(1,-1,0,ca,sa),proj(1,1,0,ca,sa),proj(-1,1,0,ca,sa)];
    ctx.fillStyle='#080A0F'; ctx.beginPath(); ctx.moveTo(g[0][0],g[0][1]);
    for(let k=1;k<4;k++)ctx.lineTo(g[k][0],g[k][1]); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(35,44,62,.45)'; ctx.lineWidth=1;
    for(let k=0;k<=GN;k++){ const u=(k/GN-0.5)*WORLD;
      let a=proj(u,-1,0,ca,sa),c=proj(u,1,0,ca,sa); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(c[0],c[1]);ctx.stroke();
      a=proj(-1,u,0,ca,sa);c=proj(1,u,0,ca,sa); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(c[0],c[1]);ctx.stroke(); }
    DATA.map.pois.forEach(p=>{ const wx=(p.x-0.5)*WORLD, wy=(p.y-0.5)*WORLD, r=0.13*WORLD;
      const q=[proj(wx-r,wy-r,0,ca,sa),proj(wx+r,wy-r,0,ca,sa),proj(wx+r,wy+r,0,ca,sa),proj(wx-r,wy+r,0,ca,sa)];
      ctx.fillStyle=rgba(h2r(p.c),0.055); ctx.beginPath();ctx.moveTo(q[0][0],q[0][1]);
      for(let k=1;k<4;k++)ctx.lineTo(q[k][0],q[k][1]); ctx.closePath(); ctx.fill(); });
  }

  const Lx=-0.5, Ly=-0.72;
  function drawBox(cell,ca,sa){
    const {wx,wy,col,hgt}=cell;
    const cor=[[wx-half,wy-half],[wx+half,wy-half],[wx+half,wy+half],[wx-half,wy+half]];
    const T=cor.map(c=>proj(c[0],c[1],hgt,ca,sa)), B=cor.map(c=>proj(c[0],c[1],0,ca,sa));
    const sides=[[0,1,0,-1],[1,2,1,0],[2,3,0,1],[3,0,-1,0]];
    sides.forEach(s=>s.d=(B[s[0]][2]+B[s[1]][2])/2); sides.sort((a,c)=>c.d-a.d);
    sides.forEach(s=>{ const nrx=s[2]*ca-s[3]*sa, nry=s[2]*sa+s[3]*ca;
      const lf=Math.max(0,nrx*Lx+nry*Ly); ctx.fillStyle=shade(col,0.30+0.60*lf);
      ctx.beginPath();ctx.moveTo(T[s[0]][0],T[s[0]][1]);ctx.lineTo(T[s[1]][0],T[s[1]][1]);
      ctx.lineTo(B[s[1]][0],B[s[1]][1]);ctx.lineTo(B[s[0]][0],B[s[0]][1]);ctx.closePath();ctx.fill(); });
    ctx.fillStyle=shade(col,1.08); ctx.beginPath();ctx.moveTo(T[0][0],T[0][1]);
    for(let k=1;k<4;k++)ctx.lineTo(T[k][0],T[k][1]); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=1; ctx.stroke();
  }

  let nodes=[];
  function drawPins(ca,sa){
    const arr=DATA.map.pois.map(p=>{ const wx=(p.x-0.5)*WORLD, wy=(p.y-0.5)*WORLD;
      const base=proj(wx,wy,0,ca,sa), top=proj(wx,wy,0.74,ca,sa); return {p,base,top,ry:base[2]}; });
    arr.sort((a,c)=>a.ry-c.ry);
    arr.forEach(o=>{ const c=h2r(o.p.c);
      const pulse=reduced?0.5:(Math.sin(t*2.2+o.p.x*9)*.5+.5);
      ctx.strokeStyle=rgba(c,0.5-pulse*0.34); ctx.lineWidth=2; ctx.beginPath();
      for(let k=0;k<=24;k++){ const a2=k/24*Math.PI*2, rr=10+pulse*16;
        const gx=o.base[0]+Math.cos(a2)*rr, gy=o.base[1]+Math.sin(a2)*rr*kSy; k?ctx.lineTo(gx,gy):ctx.moveTo(gx,gy); } ctx.stroke();
      ctx.strokeStyle=rgba(c,0.9); ctx.lineWidth=3; ctx.beginPath();ctx.moveTo(o.base[0],o.base[1]);ctx.lineTo(o.top[0],o.top[1]);ctx.stroke();
      ctx.fillStyle=rgba(c,0.16); ctx.beginPath();ctx.arc(o.top[0],o.top[1],13,0,7);ctx.fill();
      ctx.fillStyle=shade(c,1.0); ctx.beginPath();ctx.arc(o.top[0],o.top[1],5,0,7);ctx.fill();
      ctx.font='600 16px IBM Plex Mono'; const lw=ctx.measureText(o.p.n).width;
      ctx.fillStyle='rgba(9,12,18,.72)'; ctx.fillRect(o.top[0]+9,o.top[1]-16,lw+10,20);
      ctx.fillStyle=rgba(mix(c,[255,255,255],0.35),0.95); ctx.fillText(o.p.n,o.top[0]+14,o.top[1]-1);
      o.sx=o.top[0]; o.sy=o.top[1]; });
    return arr;
  }

  function draw(){
    t+=0.016;
    if(!drag && !reduced){ idle++; if(idle>40) A+=autoV; }
    const ca=Math.cos(A), sa=Math.sin(A);
    ctx.clearRect(0,0,cv.width,cv.height);
    drawGround(ca,sa);
    cells.map(c=>({c,ry:c.wx*sa+c.wy*ca})).sort((a,d)=>a.ry-d.ry).forEach(o=>drawBox(o.c,ca,sa));
    nodes=drawPins(ca,sa);
    requestAnimationFrame(draw);
  }
  draw();

  cv.addEventListener('pointerdown',e=>{ drag=true; lastX=e.clientX; cv.style.cursor='grabbing'; if(cv.setPointerCapture)cv.setPointerCapture(e.pointerId); });
  cv.addEventListener('pointerup',()=>{ drag=false; idle=0; cv.style.cursor='grab'; });
  cv.addEventListener('pointermove', e=>{
    const r=cv.getBoundingClientRect();
    if(drag){ A+=(e.clientX-lastX)*0.01; lastX=e.clientX; idle=0; tip.style.display='none'; return; }
    const sc=cv.width/r.width, mx=(e.clientX-r.left)*sc, my=(e.clientY-r.top)*sc;
    let hit=null, bd=1e9;
    nodes.forEach(o=>{ const d=Math.hypot(o.sx-mx,o.sy-my); if(d<bd&&d<34){bd=d;hit=o.p;} });
    if(hit){ tip.style.display='block';
      tip.style.left=Math.min(e.clientX-r.left+14, r.width-230)+'px'; tip.style.top=(e.clientY-r.top+10)+'px';
      tip.innerHTML=`<div class="tt">${hit.n}</div>${hit.d}`;
    } else tip.style.display='none';
  });
  cv.addEventListener('pointerleave',()=>{ tip.style.display='none'; });
})();

(function(){
  const b = mkWin('tasks','TASK BOARD','▤', 40, H*.56, Math.min(880,W*.62), 330, true);
  const COLS=['BACKLOG','IN PROGRESS','TESTING','SHIPPED'];
  b.innerHTML = `<div class="eyebrow">DRAG CARDS BETWEEN COLUMNS</div><div id="kb"></div>`;
  const kb=document.getElementById('kb');
  function render(){
    kb.innerHTML='';
    COLS.forEach((cn,ci)=>{
      const col=document.createElement('div'); col.className='kcol'; col.dataset.col=ci;
      const items=DATA.tasks.filter(t=>t.col===ci);
      col.innerHTML=`<h4>${cn}<span class="cnt">${items.length}</span></h4>`;
      items.forEach(t=>{
        const c=document.createElement('div');
        c.className='card p-'+t.pr; c.draggable=true;
        c.innerHTML=`<div class="ct">${t.t}</div><div class="cm">${t.tags.map(x=>'#'+x).join(' ')} · ${t.pr.toUpperCase()}</div>`;
        c.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text', DATA.tasks.indexOf(t)); });
        col.appendChild(c);
      });
      col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('dragover');});
      col.addEventListener('dragleave',()=>col.classList.remove('dragover'));
      col.addEventListener('drop',e=>{
        e.preventDefault(); col.classList.remove('dragover');
        const i=+e.dataTransfer.getData('text');
        if(!isNaN(i)&&DATA.tasks[i]){ DATA.tasks[i].col=ci; render(); }
      });
      kb.appendChild(col);
    });
  }
  render();
})();
